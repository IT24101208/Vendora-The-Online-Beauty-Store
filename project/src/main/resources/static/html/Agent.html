<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendora · Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --rose-50:  #fff1f5;
            --rose-100: #ffe0ea;
            --rose-200: #ffc2d4;
            --rose-400: #f77fab;
            --rose-500: #f04f86;
            --rose-600: #d63070;
            --rose-700: #b01f5a;
            --blush:    #fdf2f6;
            --petal:    #fce8f0;
            --text:     #2d1520;
            --muted:    #7a4a5e;
            --border:   #f0ccd9;
            --white:    #ffffff;
        }

        body { font-family: 'DM Sans', sans-serif; background: var(--blush); color: var(--text); min-height: 100vh; }

        /* ── Top bar ── */
        .topbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar-brand { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: var(--rose-700); }
        .topbar-right { display: flex; align-items: center; gap: 1rem; }
        .topbar-role {
            background: var(--petal); color: var(--rose-700);
            padding: .3rem .8rem; border-radius: 20px;
            font-size: .78rem; font-weight: 500;
        }
        .btn-logout {
            background: none; border: 1.5px solid var(--border);
            padding: .35rem .9rem; border-radius: 8px;
            font-family: 'DM Sans', sans-serif; font-size: .82rem;
            color: var(--muted); cursor: pointer;
            transition: all .15s;
        }
        .btn-logout:hover { border-color: var(--rose-400); color: var(--rose-700); }

        /* ── Body layout ── */
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }

        .page-title { font-family: 'Playfair Display', serif; font-size: 1.7rem; margin-bottom: .25rem; }
        .page-sub { color: var(--muted); font-size: .9rem; margin-bottom: 1.75rem; }

        /* ── Stats ── */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1.25rem; }
        .stat-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
        .stat-value { font-size: 1.75rem; font-weight: 500; margin-top: .15rem; color: var(--text); }
        .stat-card.hl { background: linear-gradient(135deg, var(--rose-500), var(--rose-700)); border-color: transparent; }
        .stat-card.hl .stat-label, .stat-card.hl .stat-value { color: #fff; }

        /* ── Filter tabs ── */
        .tabs { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
        .tab {
            padding: .38rem .9rem; border-radius: 20px;
            border: 1.5px solid var(--border);
            font-size: .82rem; font-family: 'DM Sans', sans-serif;
            cursor: pointer; background: var(--white); color: var(--muted);
            transition: all .15s;
        }
        .tab.active, .tab:hover { background: var(--rose-500); color: #fff; border-color: var(--rose-500); }

        /* ── Delivery cards ── */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }
        .delivery-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            transition: box-shadow .2s, transform .2s;
        }
        .delivery-card:hover { box-shadow: 0 6px 24px rgba(240,79,134,.12); transform: translateY(-2px); }
        .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .85rem; }
        .card-code { font-weight: 500; font-size: .95rem; }
        .card-id { font-size: .78rem; color: var(--muted); }
        .card-row { display: flex; gap: .5rem; align-items: flex-start; margin-bottom: .5rem; font-size: .875rem; }
        .card-icon { color: var(--rose-400); flex-shrink: 0; width: 16px; text-align: center; margin-top: 1px; }
        .card-label { color: var(--muted); min-width: 60px; font-size: .8rem; }
        .card-val { color: var(--text); flex: 1; }
        .card-note { background: var(--rose-50); border-radius: 8px; padding: .5rem .75rem; font-size: .82rem; color: var(--muted); margin: .75rem 0; border-left: 3px solid var(--rose-200); }
        .card-actions { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: 1rem; padding-top: .85rem; border-top: 1px solid var(--border); }

        /* ── Buttons ── */
        .btn {
            padding: .4rem .9rem; border-radius: 9px;
            font-size: .82rem; font-family: 'DM Sans', sans-serif;
            cursor: pointer; border: 1.5px solid; font-weight: 500;
            transition: all .15s;
        }
        .btn-rose    { background: var(--rose-500); color: #fff; border-color: var(--rose-500); }
        .btn-rose:hover { background: var(--rose-600); border-color: var(--rose-600); }
        .btn-outline { background: transparent; color: var(--rose-600); border-color: var(--rose-200); }
        .btn-outline:hover { background: var(--rose-50); }
        .btn-danger  { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
        .btn-danger:hover { background: #fecaca; }
        .btn-success { background: #dcfce7; color: #15803d; border-color: #86efac; }
        .btn-success:hover { background: #bbf7d0; }

        /* ── Status badges ── */
        .badge {
            display: inline-flex; align-items: center; gap: .3rem;
            padding: .22rem .65rem; border-radius: 20px;
            font-size: .73rem; font-weight: 500;
        }
        .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
        .badge-pending    { background: #fff7ed; color: #b45309; } .badge-pending::before    { background: #f59e0b; }
        .badge-assigned   { background: #eff6ff; color: #1d4ed8; } .badge-assigned::before   { background: #3b82f6; }
        .badge-accepted   { background: #f0fdf4; color: #15803d; } .badge-accepted::before   { background: #22c55e; }
        .badge-in_transit { background: var(--petal); color: var(--rose-700); } .badge-in_transit::before { background: var(--rose-500); }
        .badge-delivered  { background: #f0fdf4; color: #15803d; } .badge-delivered::before  { background: #16a34a; }
        .badge-failed     { background: #fff1f2; color: #b91c1c; } .badge-failed::before     { background: #ef4444; }
        .badge-rejected   { background: #fff1f2; color: #b91c1c; } .badge-rejected::before   { background: #f97316; }
        .badge-return_requested  { background: #fdf4ff; color: #7e22ce; } .badge-return_requested::before  { background: #a855f7; }
        .badge-return_in_transit { background: #fdf4ff; color: #7e22ce; } .badge-return_in_transit::before { background: #d946ef; }
        .badge-returned          { background: #f0fdf4; color: #15803d; } .badge-returned::before          { background: #10b981; }

        /* ── Note modal ── */
        .overlay { position: fixed; inset: 0; background: rgba(45,21,32,.45); display: none; align-items: center; justify-content: center; z-index: 200; }
        .overlay.open { display: flex; }
        .modal { background: var(--white); border-radius: 18px; width: 100%; max-width: 400px; padding: 1.75rem; box-shadow: 0 20px 50px rgba(45,21,32,.2); }
        .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
        .modal-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
        .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--muted); }
        .field label { display: block; font-size: .78rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: .4rem; }
        .field input { width: 100%; padding: .65rem .9rem; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: .9rem; color: var(--text); background: var(--rose-50); outline: none; }
        .field input:focus { border-color: var(--rose-500); background: var(--white); }
        .btn-primary { padding: .7rem 1.4rem; background: linear-gradient(135deg, var(--rose-500), var(--rose-700)); color: #fff; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 500; cursor: pointer; }
        .btn-primary:hover { opacity: .9; }

        /* ── Toast ── */
        .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: #fff; padding: .75rem 1.25rem; border-radius: 12px; font-size: .875rem; z-index: 999; transform: translateY(80px); opacity: 0; transition: transform .3s, opacity .3s; pointer-events: none; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: #15803d; }
        .toast.error   { background: #b91c1c; }

        .empty { text-align: center; padding: 3rem; color: var(--muted); }
        .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; }

        @media (max-width: 600px) {
            .stats { grid-template-columns: 1fr 1fr; }
            .card-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="topbar">
    <div class="topbar-brand">Vendora</div>
    <div class="topbar-right">
        <span class="topbar-role">Delivery Agent</span>
        <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
</header>

<div class="container">
    <div class="page-title">My Deliveries</div>
    <div class="page-sub">Track and update your assigned deliveries</div>

    <div class="stats">
        <div class="stat-card hl"><div class="stat-label">Total Assigned</div><div class="stat-value" id="st-total">—</div></div>
        <div class="stat-card"><div class="stat-label">Pending Accept</div><div class="stat-value" id="st-assigned">—</div></div>
        <div class="stat-card"><div class="stat-label">In Transit</div><div class="stat-value" id="st-transit">—</div></div>
        <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" id="st-done">—</div></div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="filterCards('ALL', this)">All</button>
        <button class="tab" onclick="filterCards('ASSIGNED', this)">New</button>
        <button class="tab" onclick="filterCards('ACCEPTED', this)">Accepted</button>
        <button class="tab" onclick="filterCards('IN_TRANSIT', this)">In Transit</button>
        <button class="tab" onclick="filterCards('DELIVERED', this)">Delivered</button>
        <button class="tab" onclick="filterCards('RETURN_REQUESTED', this)">Returns</button>
    </div>

    <div class="card-grid" id="cardGrid"></div>
</div>

<!-- Note Modal -->
<div class="overlay" id="noteModal">
    <div class="modal">
        <div class="modal-head">
            <span class="modal-title" id="noteTitle">Add Note</span>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="field">
            <label>Note / Reason</label>
            <input id="noteInput" placeholder="Describe the reason…">
        </div>
        <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1rem;">
            <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn-primary" id="noteConfirmBtn">Confirm</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const API   = 'http://localhost:8080';
    const token = localStorage.getItem('vnd_token');
    if (!token) window.location.href = 'login.html';
    const authH = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };

    let allDeliveries = [];

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }

    async function apiFetch(path, method = 'GET', body = null) {
        const opts = { method, headers: authH };
        if (body) opts.body = JSON.stringify(body);
        const r = await fetch(API + path, opts);
        if (!r.ok) throw new Error(await r.text());
        return r.json();
    }

    function toast(msg, type = '') {
        const el = document.getElementById('toast');
        el.textContent = msg; el.className = 'toast show ' + type;
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    async function load() {
        try {
            allDeliveries = await apiFetch('/deliveryagent/deliveries');
            renderStats();
            renderCards(allDeliveries);
        } catch (e) { toast('Failed to load deliveries', 'error'); }
    }

    function renderStats() {
        document.getElementById('st-total').textContent   = allDeliveries.length;
        document.getElementById('st-assigned').textContent = allDeliveries.filter(d => d.status === 'ASSIGNED').length;
        document.getElementById('st-transit').textContent  = allDeliveries.filter(d => d.status === 'IN_TRANSIT').length;
        document.getElementById('st-done').textContent     = allDeliveries.filter(d => d.status === 'DELIVERED' || d.status === 'RETURNED').length;
    }

    function filterCards(status, btn) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        renderCards(status === 'ALL' ? allDeliveries : allDeliveries.filter(d => d.status === status));
    }

    function renderCards(list) {
        const grid = document.getElementById('cardGrid');
        if (!list.length) {
            grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📭</div>No deliveries here</div>`;
            return;
        }
        grid.innerHTML = list.map(d => card(d)).join('');
    }

    function card(d) {
        const note = d.failureReason ? `<div class="card-note">📝 ${d.failureReason}</div>` : '';
        return `
    <div class="delivery-card">
      <div class="card-head">
        <div>
          <div class="card-code">${d.deliveryCode || 'DEL-' + d.id}</div>
          <div class="card-id">ID #${d.id}</div>
        </div>
        ${badge(d.status)}
      </div>
      <div class="card-row"><span class="card-icon">📍</span><span class="card-label">Address</span><span class="card-val">${d.address}</span></div>
      ${d.province ? `<div class="card-row"><span class="card-icon">🗺</span><span class="card-label">Area</span><span class="card-val">${d.province}${d.district ? ', ' + d.district : ''}</span></div>` : ''}
      ${d.trackingNumber ? `<div class="card-row"><span class="card-icon">#</span><span class="card-label">Tracking</span><span class="card-val">${d.trackingNumber}</span></div>` : ''}
      ${note}
      <div class="card-actions">${agentActions(d)}</div>
    </div>`;
    }

    function agentActions(d) {
        const btns = [];
        if (d.status === 'ASSIGNED') {
            btns.push(`<button class="btn btn-success" onclick="act(${d.id}, 'accept')">Accept</button>`);
            btns.push(`<button class="btn btn-danger"  onclick="withNote(${d.id}, 'reject', 'Reject Delivery')">Reject</button>`);
        }
        if (d.status === 'ACCEPTED')
            btns.push(`<button class="btn btn-rose" onclick="act(${d.id}, 'pickup')">Picked Up</button>`);
        if (d.status === 'IN_TRANSIT') {
            btns.push(`<button class="btn btn-success" onclick="act(${d.id}, 'complete')">Delivered</button>`);
            btns.push(`<button class="btn btn-danger"  onclick="withNote(${d.id}, 'fail', 'Mark as Failed')">Failed</button>`);
        }
        if (d.status === 'RETURN_REQUESTED')
            btns.push(`<button class="btn btn-rose" onclick="act(${d.id}, 'pickup-return')">Pickup Return</button>`);
        if (d.status === 'RETURN_IN_TRANSIT')
            btns.push(`<button class="btn btn-success" onclick="act(${d.id}, 'complete-return')">Return Complete</button>`);
        return btns.join('');
    }

    async function act(id, action) {
        try {
            await apiFetch(`/deliveryagent/deliveries/${id}/${action}`, 'POST');
            toast('Updated!', 'success');
            load();
        } catch (e) { toast('Action failed', 'error'); }
    }

    // Actions requiring a note
    let pendingAction = null;
    function withNote(id, action, title) {
        pendingAction = { id, action };
        document.getElementById('noteTitle').textContent = title;
        document.getElementById('noteInput').value = '';
        document.getElementById('noteConfirmBtn').onclick = confirmNote;
        document.getElementById('noteModal').classList.add('open');
    }
    async function confirmNote() {
        const note = document.getElementById('noteInput').value.trim();
        if (!note) { toast('Please enter a note', 'error'); return; }
        closeModal();
        try {
            await apiFetch(`/deliveryagent/deliveries/${pendingAction.id}/${pendingAction.action}`, 'POST', { note });
            toast('Updated!', 'success');
            load();
        } catch (e) { toast('Action failed', 'error'); }
    }
    function closeModal() { document.getElementById('noteModal').classList.remove('open'); }

    function badge(status) {
        return `<span class="badge badge-${status.toLowerCase()}">${status.replace(/_/g,' ')}</span>`;
    }

    load();
</script>
</body>
</html>
