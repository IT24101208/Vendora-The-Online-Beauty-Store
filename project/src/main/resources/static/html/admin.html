<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Beauty Store</title>
    <style>
        /* Base styles for a clean, professional admin look */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #be185d; text-align: center; border-bottom: 2px solid #fce7f3; padding-bottom: 10px; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #be185d; color: white; text-transform: uppercase; font-size: 13px; }

        /* Conditional Status Badges: Dynamic classes mapped to API status strings */
        .status-badge { padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .pending { background: #fef3c7; color: #92400e; }
        .shipped { background: #dbeafe; color: #1e40af; }
        .delivered { background: #dcfce7; color: #166534; }
        .paid { background: #dcfce7; color: #166534; font-weight: bold; }
        .cancelled { background: #fee2e2; color: #991b1b; }
        .refund-requested { background: #ffedd5; color: #9a3412; }

        /* Action Buttons: Color-coded by intent (Update, Receipt, Delete, Refund) */
        button { cursor: pointer; border: none; padding: 7px 12px; border-radius: 5px; font-weight: bold; color: white; transition: 0.3s; }
        .btn-status { background: #be185d; }
        .btn-pay { background: #059669; }
        .btn-del { background: #ef4444; }
        .btn-refund { background: #1d4ed8; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Order Management</h2>
    <table>
        <thead>
        <tr>
            <th>Order ID</th>
            <th>Customer Name</th>
            <th>Product</th>
            <th>Current Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="orderTableBody"></tbody>
    </table>

    <hr style="margin-top: 50px; border: 1px solid #fce7f3;">

    <h2>💳 Payment Confirmations</h2>
    <table>
        <thead>
        <tr>
            <th>Order ID</th>
            <th>Total Amount</th>
            <th>Payment Method</th>
            <th>Payment Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="paymentTableBody"></tbody>
    </table>

    <hr style="margin-top: 50px; border: 1px solid #fce7f3;">

    <h2 style="color: #1d4ed8;">💸 Pending Refunds (Refund Requests)</h2>
    <table>
        <thead>
        <tr>
            <th>Order ID</th>
            <th>Amount</th>
            <th>Payment Method</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="refundTableBody"></tbody>
    </table>
</div>

<script>
    /* Initialize dashboard by fetching data from Spring Boot API */
    document.addEventListener('DOMContentLoaded', () => {
        loadOrders();
        loadPayments();
        loadRefundRequests();
    });

    /** * Fetches all orders and renders them with appropriate status badges
     */
    async function loadOrders() {
        try {
            const res = await fetch('http://localhost:8080/api/orders');
            const orders = await res.json();
            const body = document.getElementById('orderTableBody');
            body.innerHTML = "";

            orders.forEach(order => {
                const status = order.status || 'Pending';
                // Convert spaces to hyphens for CSS class matching (e.g., "Refund Requested" -> "refund-requested")
                const statusClass = status.replace(/\s+/g, '-').toLowerCase();

                body.innerHTML += `
                    <tr>
                        <td>#${order.id}</td>
                        <td>${order.firstName || ''} ${order.lastName || ''}</td>
                        <td>${order.product}</td>
                        <td><span class="status-badge ${statusClass}">${status}</span></td>
                        <td>
                            <button class="btn-status" onclick="updateStatus(${order.id})">Update Status</button>
                            <button class="btn-del" onclick="deleteOrder(${order.id})">Delete Order</button>
                        </td>
                    </tr>
                `;
            });
        } catch (error) { console.error("Error loading orders:", error); }
    }

    /** * Renders payment details and provides "Confirm Receipt" button for unpaid orders
     */
    async function loadPayments() {
        try {
            const res = await fetch('http://localhost:8080/api/orders');
            const payments = await res.json();
            const body = document.getElementById('paymentTableBody');
            body.innerHTML = "";

            payments.forEach(pay => {
                const pStatus = pay.paymentStatus || 'PENDING';
                body.innerHTML += `
                <tr>
                    <td>#${pay.id}</td>
                    <td>Rs. ${pay.amount ? pay.amount.toFixed(2) : '0.00'}</td>
                    <td><strong>${pay.paymentMethod || 'N/A'}</strong></td>
                    <td><span class="status-badge ${pStatus.toLowerCase()}">${pStatus}</span></td>
                    <td>
                        ${pStatus === 'PENDING' ?
                    `<button class="btn-pay" onclick="confirmPayment(${pay.id})">Confirm Receipt</button>` :
                    '<span style="color: #059669; font-weight: bold;">✅ Verified</span>'}
                    </td>
                </tr>
            `;
            });
        } catch (error) { console.error("Error loading payments:", error); }
    }

    /** * Filters the order list specifically for "Refund Requested" status
     */
    async function loadRefundRequests() {
        try {
            const res = await fetch('http://localhost:8080/api/orders');
            const orders = await res.json();
            const body = document.getElementById('refundTableBody');
            body.innerHTML = "";

            const refundOrders = orders.filter(o => o.status === 'Refund Requested');

            refundOrders.forEach(order => {
                body.innerHTML += `
                    <tr>
                        <td>#${order.id}</td>
                        <td>Rs. ${order.amount.toFixed(2)}</td>
                        <td>${order.paymentMethod}</td>
                        <td>
                            <button class="btn-refund" onclick="completeRefund(${order.id})">Mark as Refunded</button>
                        </td>
                    </tr>
                `;
            });
        } catch (error) { console.error("Error loading refunds:", error); }
    }

    /** * API Call: Marks an order as refunded (Updates status to 'Cancelled')
     */
    async function completeRefund(id) {
        if(confirm("Confirm that you have manually refunded the money for Order #" + id + "?")) {
            try {
                await fetch(`http://localhost:8080/api/orders/${id}/status`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify("Cancelled")
                });
                alert("Order status updated to Cancelled and Refunded.");
                refreshAll();
            } catch (err) { console.error(err); }
        }
    }

    /** * API Call: Generic status update via prompt
     */
    async function updateStatus(id) {
        const s = prompt("New Status (Shipped / Delivered / Pending / Cancelled):");
        if(s) {
            try {
                await fetch(`http://localhost:8080/api/orders/${id}/status`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(s)
                });
                refreshAll();
            } catch (err) { console.error("Error updating status:", err); }
        }
    }

    /** * API Call: Triggers the @Transactional payment confirmation logic in backend
     */
    async function confirmPayment(id) {
        if(confirm("Verify receipt of payment?")) {
            try {
                const response = await fetch(`http://localhost:8080/api/orders/${id}/pay-confirm`, { method: 'PUT' });
                if (response.ok) {
                    alert("Payment Verified!");
                    refreshAll();
                }
            } catch (error) { console.error(error); }
        }
    }

    /** * API Call: Removes record from database
     */
    async function deleteOrder(id) {
        if(confirm("Delete this order? This cannot be undone.")) {
            try {
                await fetch(`http://localhost:8080/api/orders/${id}`, { method: 'DELETE' });
                refreshAll();
            } catch (err) { console.error(err); }
        }
    }

    // Helper to keep all table views in sync after an update
    function refreshAll() {
        loadOrders();
        loadPayments();
        loadRefundRequests();
    }
</script>
</body>
</html>
