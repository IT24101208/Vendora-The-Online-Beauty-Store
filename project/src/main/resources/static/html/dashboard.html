<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Supplier — ' + ${supplier.companyName}">Supplier dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-pink-50">

<header class="px-8 py-5 flex items-center justify-between bg-white border-b border-pink-100">
    <a th:href="@{/}" class="text-2xl font-serif font-bold text-pink-600">Vendora</a>
    <nav class="flex items-center gap-4 text-sm font-semibold">
        <a th:href="@{/supplier/dashboard}" class="text-pink-600">Dashboard</a>
        <a th:href="@{/logout}" class="text-gray-600 hover:text-pink-600">Sign out</a>
    </nav>
</header>

<main class="max-w-6xl mx-auto px-6 py-10">
    <div th:if="${toast}" class="mb-6 rounded-2xl bg-pink-100 border border-pink-200 text-pink-700 px-5 py-3">
        <i class="fa-solid fa-circle-check mr-2"></i><span th:text="${toast}"></span>
    </div>

    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-serif font-bold" th:text="${supplier.companyName}"></h1>
            <p class="text-gray-500 text-sm">Welcome back. Manage your products and incoming orders.</p>
        </div>
        <a th:href="@{/supplier/product/new}" class="rounded-full bg-pink-500 hover:bg-pink-600 text-white font-semibold px-5 py-2.5">
            <i class="fa-solid fa-plus mr-1"></i> Add product
        </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
        <div class="bg-white rounded-2xl p-5 shadow"><p class="text-xs uppercase text-gray-500">Total products</p><p class="text-3xl font-serif font-bold text-pink-600 mt-2" th:text="${productCount}">0</p></div>
        <div class="bg-white rounded-2xl p-5 shadow"><p class="text-xs uppercase text-gray-500">Pending orders</p><p class="text-3xl font-serif font-bold text-pink-600 mt-2" th:text="${pendingOrders}">0</p></div>
        <div class="bg-white rounded-2xl p-5 shadow"><p class="text-xs uppercase text-gray-500">Status</p><p class="text-2xl font-serif font-bold text-emerald-500 mt-2" th:text="${supplier.status}">Approved</p></div>
    </div>

    <div class="bg-white rounded-3xl shadow overflow-hidden">
        <div class="px-6 py-4 border-b border-pink-100"><h2 class="font-serif text-xl font-bold">My products</h2></div>
        <div th:if="${#lists.isEmpty(products)}" class="text-center py-12 text-gray-500">
            <i class="fa-regular fa-image fa-2x mb-3 text-pink-300"></i><p>No products yet — add your first beauty product.</p>
        </div>
        <table th:unless="${#lists.isEmpty(products)}" class="w-full text-sm">
            <thead class="bg-pink-50 text-pink-700 uppercase text-xs">
                <tr><th class="text-left px-6 py-3">Image</th><th class="text-left px-6 py-3">Name</th><th class="text-left px-6 py-3">Category</th><th class="text-right px-6 py-3">Price</th><th class="text-right px-6 py-3">Stock</th><th class="px-6 py-3"></th></tr>
            </thead>
            <tbody>
                <tr th:each="p : ${products}" class="border-t border-pink-100 hover:bg-pink-50/50">
                    <td class="px-6 py-3"><img th:if="${p.imagePath != null}" th:src="${p.imagePath}" class="w-12 h-12 rounded-xl object-cover"></td>
                    <td class="px-6 py-3 font-semibold" th:text="${p.name}"></td>
                    <td class="px-6 py-3" th:text="${p.category}"></td>
                    <td class="px-6 py-3 text-right">Rs. <span th:text="${#numbers.formatDecimal(p.price,1,'COMMA',2,'POINT')}"></span></td>
                    <td class="px-6 py-3 text-right" th:text="${p.stockQuantity}"></td>
                    <td class="px-6 py-3 text-right space-x-2">
                        <a th:href="@{'/supplier/product/edit/' + ${p.id}}" class="text-pink-600 hover:underline"><i class="fa-regular fa-pen-to-square"></i> Edit</a>
                        <a th:href="@{'/supplier/product/delete/' + ${p.id}}" onclick="return confirm('Delete this product?')" class="text-red-500 hover:underline"><i class="fa-regular fa-trash-can"></i> Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
