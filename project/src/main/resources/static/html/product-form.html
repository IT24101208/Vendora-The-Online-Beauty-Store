<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${editing} ? 'Edit product' : 'Add product'">Product form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50">

<header class="px-8 py-5 flex items-center justify-between bg-white border-b border-pink-100">
    <a th:href="@{/supplier/dashboard}" class="text-pink-600 font-semibold">← Back to dashboard</a>
</header>

<main class="max-w-2xl mx-auto px-6 py-10">
    <h1 class="text-3xl font-serif font-bold mb-6" th:text="${editing} ? 'Edit product' : 'Add a new product'">Add product</h1>

    <form th:action="@{/supplier/product/save}" th:object="${form}" method="post" enctype="multipart/form-data" class="bg-white rounded-3xl shadow p-8 space-y-5">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{existingImagePath}">

        <div><label class="block text-sm font-semibold mb-1">Product name</label><input type="text" th:field="*{name}" class="w-full rounded-xl border border-pink-200 px-4 py-2"><p class="text-xs text-red-500" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p></div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="block text-sm font-semibold mb-1">Category</label><select th:field="*{category}" class="w-full rounded-xl border border-pink-200 px-4 py-2"><option value="">Choose…</option><option>Skincare</option><option>Makeup</option><option>Fragrance</option><option>Haircare</option><option>Bath &amp; Body</option></select><p class="text-xs text-red-500" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></p></div>
            <div><label class="block text-sm font-semibold mb-1">Price (LKR)</label><input type="number" step="0.01" th:field="*{price}" class="w-full rounded-xl border border-pink-200 px-4 py-2"><p class="text-xs text-red-500" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></p></div>
        </div>
        <div><label class="block text-sm font-semibold mb-1">Stock quantity</label><input type="number" min="0" th:field="*{stockQuantity}" class="w-full rounded-xl border border-pink-200 px-4 py-2"><p class="text-xs text-red-500" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}"></p></div>
        <div><label class="block text-sm font-semibold mb-1">Description</label><textarea th:field="*{description}" rows="4" class="w-full rounded-xl border border-pink-200 px-4 py-2"></textarea></div>
        <div><label class="block text-sm font-semibold mb-1">Product image</label><input type="file" name="image" accept="image/*" class="block w-full text-sm text-gray-600 file:mr-4 file:rounded-full file:border-0 file:bg-pink-100 file:text-pink-700 file:px-4 file:py-2"><div th:if="${form.existingImagePath != null}" class="mt-3"><p class="text-xs text-gray-500 mb-1">Current image:</p><img th:src="${form.existingImagePath}" class="w-24 h-24 rounded-xl object-cover"></div></div>
        <div class="flex justify-end gap-3 pt-4"><a th:href="@{/supplier/dashboard}" class="rounded-full px-5 py-2 border border-pink-200 text-gray-700">Cancel</a><button type="submit" class="rounded-full bg-pink-500 hover:bg-pink-600 text-white font-semibold px-6 py-2" th:text="${editing} ? 'Save changes' : 'Add product'">Save</button></div>
    </form>
</main>
</body>
</html>
