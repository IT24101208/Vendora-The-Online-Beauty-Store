<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.id == null} ? 'Add Product' : 'Edit Product'">Product Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'); body{font-family:'Poppins',sans-serif;background:#fdf2f8;}</style>
</head>
<body class="bg-pink-50">
<nav class="bg-white shadow-md py-4">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <span class="text-2xl font-bold text-pink-500">Vendora Supplier</span>
        <a href="/supplier/dashboard" class="text-gray-600 hover:text-pink-500"><i class="fas fa-arrow-left"></i> Back</a>
    </div>
</nav>
<div class="max-w-3xl mx-auto px-6 py-12">
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
        <div class="bg-pink-500 px-8 py-6"><h2 class="text-2xl font-bold text-white" th:text="${product.id == null} ? 'Add New Product' : 'Edit Product'"></h2></div>
        <form th:action="${product.id == null} ? '/supplier/dashboard/products' : '/supplier/dashboard/products/update/' + ${product.id}" method="post" enctype="multipart/form-data" class="p-8 space-y-5">
            <div><label class="block text-gray-700 font-medium mb-2">Product Name</label><input type="text" th:field="*{name}" required class="w-full px-4 py-3 border rounded-xl"></div>
            <div><label class="block text-gray-700 font-medium mb-2">Category</label><select th:field="*{category}" class="w-full px-4 py-3 border rounded-xl"><option>Skincare</option><option>Makeup</option><option>Haircare</option><option>Fragrance</option></select></div>
            <div><label class="block text-gray-700 font-medium mb-2">Price (LKR)</label><input type="number" step="0.01" th:field="*{price}" required class="w-full px-4 py-3 border rounded-xl"></div>
            <div><label class="block text-gray-700 font-medium mb-2">Stock Quantity</label><input type="number" th:field="*{stockQuantity}" required class="w-full px-4 py-3 border rounded-xl"></div>
            <div><label class="block text-gray-700 font-medium mb-2">Description</label><textarea th:field="*{description}" rows="3" class="w-full px-4 py-3 border rounded-xl"></textarea></div>
            <div><label class="block text-gray-700 font-medium mb-2">Product Image</label><input type="file" name="imageFile" accept="image/*" onchange="previewImage(event)" class="w-full"><img id="imagePreview" th:if="${product.imagePath}" th:src="${product.imagePath}" class="mt-2 w-32 h-32 object-cover rounded"></div>
            <div class="flex gap-4 pt-4"><button type="submit" class="flex-1 bg-pink-500 text-white py-3 rounded-xl">Save Product</button><a href="/supplier/dashboard" class="flex-1 text-center bg-gray-200 py-3 rounded-xl">Cancel</a></div>
        </form>
    </div>
</div>
<script>function previewImage(e){var preview=document.getElementById('imagePreview');if(e.target.files.length){var reader=new FileReader();reader.onload=function(e){preview.src=e.target.result;preview.style.display='block';};reader.readAsDataURL(e.target.files[0]);}}</script>
</body>
</html>
