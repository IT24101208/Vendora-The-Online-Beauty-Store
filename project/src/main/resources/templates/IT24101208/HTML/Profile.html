<!DOCTYPE html>
<html>
<head>
    <title>Vendora - Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h2>My Profile</h2>

    <form action="#" method="post">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" value="Shar" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" value="example@email.com" required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="tel" value="0712345678" pattern="[0-9]{10}" required>
        </div>

        <button type="submit">Update Profile</button>

    </form>
</div>

</body>
</html>
