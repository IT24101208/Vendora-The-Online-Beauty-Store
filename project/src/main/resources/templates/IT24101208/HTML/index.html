<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vendora - Online Beauty Store</title>

    <link rel="stylesheet" href="../CSS/common.css">

    <style>

        body{
            margin:0;
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            margin:0;
            font-family: Arial, sans-serif;
            /* Background image added */
            background: url('../images/background 2.jpg') no-repeat center center fixed;
            background-size: cover; /* make sure it covers the entire screen */
            color: #333; /* default text color */

        }

        /* ---------------- TOP BAR (Login / Signup row) ---------------- */

        .top-bar{
            background:#c9302c;
            color:white;
            padding:6px 50px;
            display:flex;
            justify-content:flex-end;
            gap:20px;
            font-size:13px;
        }

        .top-bar a{
            color:white;
            text-decoration:none;
        }

        /* ---------------- MAIN NAV BAR ---------------- */

        .nav-bar{
            background:#d9534f;
            display:flex;
            align-items:center;
            padding:12px 50px;
            gap:25px;
        }

        /* logo left */
        .logo img{
            width:55px;
            height:55px;
            border-radius:50%;
            object-fit:cover;
        }

        /* search bar center */
        .search-box{
            flex:0;
        }

        .search-box input{
            width:100%;
            padding:10px 15px;
            border-radius:4px;
            border:none;
            outline:none;
        }

        /* ---------------- CONTAINER ---------------- */

        .container{
            width:90%;
            max-width:1200px;
            margin:25px auto;
        }

        /* ---------------- SECTION TITLE ---------------- */

        .section-title{
            font-size:20px;
            margin-bottom:15px;
        }

        /* ---------------- PRODUCTS (horizontal like your image) ---------------- */

        .products{
            display:flex;
            gap:15px;
            overflow-x:auto;
            padding-bottom:10px;
        }

        .product-card{
            min-width:180px;
            max-width:180px;
            background:white;
            border-radius:6px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            padding:10px;
            text-align:center;
            flex-shrink:0;
        }

        .product-card img{
            width:100%;
            height:140px;
            object-fit:contain;
        }

        .product-card h3{
            font-size:14px;
            margin:8px 0 4px 0;
            color:#333;
        }

        .product-card p{
            font-size:13px;
            color:#d9534f;
            margin:0 0 6px 0;
            font-weight:bold;
        }

        .product-card button{
            padding:6px 10px;
            font-size:13px;
            background:#ffb2c5;
            border:none;
            border-radius:4px;
            cursor:pointer;
        }

        /* scrollbar similar behaviour */
        .products::-webkit-scrollbar{
            height:6px;
        }
        .products::-webkit-scrollbar-thumb{
            background:#ccc;
            border-radius:10px;
        }

        @media(max-width:768px){

            .nav-bar{
                padding:12px 15px;
            }

            .top-bar{
                padding:6px 15px;
            }

        }

    </style>
</head>

<body>

<div class="top-bar">
    <a href="Login.html">Login</a>
    <a href="Register.html">Sign Up</a>
</div>

<!-- main header -->
<div class="nav-bar">

    <!-- logo left -->
    <div class="logo">
        <img src="../images/vendora-Logo.png" alt="Vendora Logo">
    </div>

    <!-- search center (exists in your screenshot) -->
    <div class="search-box">
        <input type="text" placeholder="Search in Vendora">
    </div>

</div>


<div class="container">

    <div class="products">

        <div class="product-card">
            <img src="../images/product1.webp" alt="DaNiEL Rose Lipstick">
            <h3>Rose Lipstick</h3>
            <p>Rs.950</p>
            <button onclick="redirectLogin()">Buy Now</button>
        </div>

        <div class="product-card">
            <img src="../images/product2.png" alt="GIORGIO ARMANI">
            <h3>GIORGIO ARMANI Glow Foundation</h3>
            <p>Rs. 1,800</p>
            <button onclick="redirectLogin()">Buy Now</button>
        </div>

        <div class="product-card">
            <img src="../images/product3.webp" alt="Eye Shadow Palette">
            <h3>Eye Shadow Palette - 20 Shades</h3>
            <p>Rs. 2,250</p>
            <button onclick="redirectLogin()">Buy Now</button>
        </div>

        <div class="product-card">
            <img src="../images/product4.png" alt="Face Serum">
            <h3>Element Apothec Face Serum</h3>
            <p>Rs. 1, 450</p>
            <button onclick="redirectLogin()">Buy Now</button>
        </div>

        <div class="product-card">
            <img src="../images/product5.jpg" alt="APK Blush Kit">
            <h3>APK Blush Kit</h3>
            <p>Rs. 1,350</p>
            <button onclick="redirectLogin()">Buy Now</button>
        </div>

    </div>

</div>


<script>
    function redirectLogin(){
        alert("You must login or register to purchase.");
        window.location.href="Login.html";
    }
</script>

</body>
</html>
