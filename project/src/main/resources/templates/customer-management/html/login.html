<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendora | Login</title>

    <link rel="stylesheet" href="../../../static/css/base.css" th:href="@{/css/base.css}">
    <link rel="stylesheet" href="../../../static/css/components.css" th:href="@{/css/components.css}">
    <link rel="stylesheet" href="../../../static/css/footer.css" th:href="@{/css/footer.css}">
    <link rel="stylesheet" href="../../../static/css/header.css" th:href="@{/css/header.css}">
    <link rel="stylesheet" href="../../../static/css/form.css" th:href="@{/css/form.css}">
    <link rel="stylesheet" href="../../../static/css/layout.css" th:href="@{/css/layout.css}">

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed&family=Playfair+Display&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="page-bg">
    <div class="page-wrapper">
        <header class="header-grid">
            <div class="logo">
                <img alt="Vendora Logo" src="../../../static/images/Vendora.png" th:src="@{/images/Vendora.png}">
            </div>
            <nav class="navbar">
                <a href="../../../static/html/index.html" th:href="@{/html/index.html}">Home</a>
                <a href="../../../static/html/shop.html" th:href="@{/html/shop.html}">Shop</a>
                <a href="../../../static/html/about.html" th:href="@{/html/about.html}">About</a>
            </nav>
        </header>

        <main class="container">
            <h1 class="page-title">Login</h1>

            <form id="loginForm" class="form-card" autocomplete="off">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required placeholder="you@example.com">

                <label for="password">Password</label>
                <input id="password" name="password" type="password" required placeholder="Your password">

                <button type="submit" class="btn-primary">Login</button>

                <p class="form-note">
                    No account?
                    <a href="signup.html" th:href="@{/customer/signup}">Sign up</a>
                </p>

                <p id="loginStatus" class="form-status" aria-live="polite"></p>
            </form>
        </main>

        <footer class="footer">
            <div class="footer-grid">
                <div class="footer-bottom">© 2026 Vendora | The Online Beauty Store</div>
            </div>
        </footer>
    </div>

    <script src="../../../static/js/main.js" th:src="@{/js/main.js}"></script>
    <script>
        const form = document.getElementById("loginForm");
        const statusEl = document.getElementById("loginStatus");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            if (!email || !password) {
                statusEl.textContent = "Please enter email and password.";
                return;
            }

            statusEl.textContent = "Signing in...";

            try {
                const res = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify({ usernameOrEmail: email, password })
                });

                const raw = await res.text();
                let data = {};
                try { data = JSON.parse(raw); } catch (_) { }

                if (!res.ok) {
                    statusEl.textContent = data.message || raw || "Login failed.";
                    return;
                }

                if (data.accessToken) {
                    localStorage.setItem("vendoraToken", data.accessToken);
                    localStorage.setItem("vendoraUser", JSON.stringify({ email }));
                }
                window.location.href = "/customer/profile";
            } catch (err) {
                statusEl.textContent = "Network error. Is the server running on port 8080?";
            }
        });
    </script>
</body>

</html>
