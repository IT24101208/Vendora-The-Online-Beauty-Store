<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendora Catalog</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div id="navbar-root"></div>
  
<main class="page">
  <section class="page-header">
    <h1 class="page-title">Product Catalog</h1>
    <p class="page-subtitle">Customer-facing catalog rebuilt with plain HTML, CSS, and JavaScript.</p>
  </section>
  <section class="card pad">
    <form id="user-products-filter-form" class="filter-bar" style="grid-template-columns:2fr 1fr auto;">
      <input class="input" type="text" name="keyword" placeholder="Search products..." />
      <select class="select" name="category" id="user-filter-category"></select>
      <button class="btn btn-primary" type="submit">Search</button>
    </form>
    <div id="user-products-summary" class="muted" style="margin-bottom:16px;"></div>
    <div id="user-products-grid" class="product-grid"></div>
  </section>
</main>

  <script type="module" src="assets/js/pages/user-products.js"></script>
</body>
</html>
