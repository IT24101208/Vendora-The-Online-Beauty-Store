spring.application.name=Vendora
server.port=8080

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vendora}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:200285904246}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Jackson ───────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ── JWT ───────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:Vendora$ecretKey2025!ForJWTTokenGenerationAndValidation#Secure}
app.jwt.expiry-ms=86400000

# ── Logging ───────────────────────────────────────────────────
logging.level.com.vendora=INFO
logging.level.org.springframework.security=WARN
