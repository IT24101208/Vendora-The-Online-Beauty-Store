<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendora · Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* noinspection CssUnknownProperty, CssInvalidPropertyValue */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --rose-50:  #fff1f5;
            --rose-100: #ffe0ea;
            --rose-200: #ffc2d4;
            --rose-400: #f77fab;
            --rose-500: #f04f86;
            --rose-600: #d63070;
            --rose-700: #b01f5a;
            --blush:    #fdf2f6;
            --petal:    #fce8f0;
            --text:     #2d1520;
            --muted:    #7a4a5e;
            --border:   #f0ccd9;
            --white:    #ffffff;
        }

        body { font-family: 'DM Sans', sans-serif; background: var(--blush); color: var(--text); min-height: 100vh; }

        /* ── Top bar ── */
        .topbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar-brand { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: var(--rose-700); }
        .topbar-right { display: flex; align-items: center; gap: 1rem; }
        .topbar-role {
            background: var(--petal); color: var(--rose-700);
            padding: .3rem .8rem; border-radius: 20px;
            font-size: .78rem; font-weight: 500;
        }
        .btn-logout {
            background: none; border: 1.5px solid var(--border);
            padding: .35rem .9rem; border-radius: 8px;
            font-family: 'DM Sans', sans-serif; font-size: .82rem;
            color: var(--muted); cursor: pointer;
            transition: all .15s;
        }
        .btn-logout:hover { border-color: var(--rose-400); color: var(--rose-700); }

        /* ── Body layout ── */
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }

        .page-title { font-family: 'Playfair Display', serif; font-size: 1.7rem; margin-bottom: .25rem; }
        .page-sub { color: var(--muted); font-size: .9rem; margin-bottom: 1.75rem; }

        /* ── Stats ── */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1.25rem; }
        .stat-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
        .stat-value { font-size: 1.75rem; font-weight: 500; margin-top: .15rem; color: var(--text); }
        .stat-card.hl { background: linear-gradient(135deg, var(--rose-500), var(--rose-700)); border-color: transparent; }
        .stat-card.hl .stat-label, .stat-card.hl .stat-value { color: #fff; }

        /* ── Filter tabs ── */
        .tabs { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
        .tab {
            padding: .38rem .9rem; border-radius: 20px;
            border: 1.5px solid var(--border);
            font-size: .82rem; font-family: 'DM Sans', sans-serif;
            cursor: pointer; background: var(--white); color: var(--muted);
            transition: all .15s;
        }
        .tab.active, .tab:hover { background: var(--rose-500); color: #fff; border-color: var(--rose-500); }

        /* ── Delivery cards ── */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }
        .delivery-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            transition: box-shadow .2s, transform .2s;
        }
        .delivery-card:hover { box-shadow: 0 6px 24px rgba(240,79,134,.12); transform: translateY(-2px); }
        .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .85rem; }
        .card-code { font-weight: 500; font-size: .95rem; }
        .card-id { font-size: .78rem; color: var(--muted); }
        .card-row { display: flex; gap: .5rem; align-items: flex-start; margin-bottom: .5rem; font-size: .875rem; }
        .card-icon { color: var(--rose-400); flex-shrink: 0; width: 16px; text-align: center; margin-top: 1px; }
        .card-label { color: var(--muted); min-width: 60px; font-size: .8rem; }
        .card-val { color: var(--text); flex: 1; }
        .card-note { background: var(--rose-50); border-radius: 8px; padding: .5rem .75rem; font-size: .82rem; color: var(--muted); margin: .75rem 0; border-left: 3px solid var(--rose-200); }
        .card-actions { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: 1rem; padding-top: .85rem; border-top: 1px solid var(--border); }

        /* ── Buttons ── */
        .btn {
            padding: .4rem .9rem; border-radius: 9px;
            font-size: .82rem; font-family: 'DM Sans', sans-serif;
            cursor: pointer; border: 1.5px solid; font-weight: 500;
            transition: all .15s;
        }
        .btn-rose    { background: var(--rose-500); color: #fff; border-color: var(--rose-500); }
        .btn-rose:hover { background: var(--rose-600); border-color: var(--rose-600); }
        .btn-outline { background: transparent; color: var(--rose-600); border-color: var(--rose-200); }
        .btn-outline:hover { background: var(--rose-50); }
        .btn-danger  { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
        .btn-danger:hover { background: #fecaca; }
        .btn-success { background: #dcfce7; color: #15803d; border-color: #86efac; }
        .btn-success:hover { background: #bbf7d0; }

        /* ── Status badges ── */
        .badge {
            display: inline-flex; align-items: center; gap: .3rem;
            padding: .22rem .65rem; border-radius: 20px;
            font-size: .73rem; font-weight: 500;
        }
        .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
        .badge-pending          { background: #fff7ed; color: #b45309; } .badge-pending::before          { background: #f59e0b; }
        .badge-assigned         { background: #eff6ff; color: #1d4ed8; } .badge-assigned::before         { background: #3b82f6; }
        .badge-out_for_delivery { background: var(--petal); color: var(--rose-700); } .badge-out_for_delivery::before { background: var(--rose-500); }
        .badge-delivered        { background: #f0fdf4; color: #15803d; } .badge-delivered::before        { background: #16a34a; }
        .badge-failed           { background: #fff1f2; color: #b91c1c; } .badge-failed::before           { background: #ef4444; }
        .badge-returned         { background: #fdf4ff; color: #7e22ce; } .badge-returned::before         { background: #a855f7; }

        /* ── Tracking bar ── */
        .track-bar { display: flex; align-items: center; margin: 1rem 0; overflow-x: auto; padding-bottom: .25rem; }
        .track-step { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 60px; }
        .track-dot {
            width: 26px; height: 26px; border-radius: 50%;
            border: 2px solid var(--border); background: var(--white);
            display: flex; align-items: center; justify-content: center;
            font-size: .72rem; color: var(--muted); position: relative; z-index: 1;
        }
        .track-dot.done { background: var(--rose-500); border-color: var(--rose-500); color: #fff; }
        .track-dot.cur  { background: var(--white); border-color: var(--rose-500); color: var(--rose-500); box-shadow: 0 0 0 3px var(--rose-100); }
        .track-line { flex: 1; height: 2px; background: var(--border); margin: 0 -2px; position: relative; top: -13px; z-index: 0; }
        .track-line.done { background: var(--rose-400); }
        .track-lbl { font-size: .64rem; color: var(--muted); margin-top: .3rem; text-align: center; line-height: 1.2; white-space: nowrap; }
        .track-lbl.done, .track-lbl.cur { color: var(--rose-600); font-weight: 500; }

        /* ── Note modal ── */
        .overlay { position: fixed; inset: 0; background: rgba(45,21,32,.45); display: none; align-items: center; justify-content: center; z-index: 200; }
        .overlay.open { display: flex; }
        .modal { background: var(--white); border-radius: 18px; width: 100%; max-width: 400px; padding: 1.75rem; box-shadow: 0 20px 50px rgba(45,21,32,.2); }
        .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
        .modal-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
        .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--muted); }
        .field label { display: block; font-size: .78rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: .4rem; }
        .field input { width: 100%; padding: .65rem .9rem; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: .9rem; color: var(--text); background: var(--rose-50); outline: none; }
        .field input:focus { border-color: var(--rose-500); background: var(--white); }
        .btn-primary { padding: .7rem 1.4rem; background: linear-gradient(135deg, var(--rose-500), var(--rose-700)); color: #fff; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 500; cursor: pointer; }
        .btn-primary:hover { opacity: .9; }

        /* ── Toast ── */
        .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: #fff; padding: .75rem 1.25rem; border-radius: 12px; font-size: .875rem; z-index: 999; transform: translateY(80px); opacity: 0; transition: transform .3s, opacity .3s; pointer-events: none; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: #15803d; }
        .toast.error   { background: #b91c1c; }

        .empty { text-align: center; padding: 3rem; color: var(--muted); }
        .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; }

        @media (max-width: 600px) {
            .stats { grid-template-columns: 1fr 1fr; }
            .card-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="topbar">
    <div class="topbar-brand">Vendora</div>
    <div class="topbar-right">
        <span class="topbar-role">Delivery Agent</span>
        <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
</header>

<div class="container">
    <div class="page-title">My Deliveries</div>
    <div class="page-sub">Track and update your assigned deliveries</div>

    <div class="stats">
        <div class="stat-card hl"><div class="stat-label">Total Assigned</div><div class="stat-value" id="st-total">—</div></div>
        <div class="stat-card"><div class="stat-label">Pending Accept</div><div class="stat-value" id="st-assigned">—</div></div>
        <div class="stat-card"><div class="stat-label">In Transit</div><div class="stat-value" id="st-transit">—</div></div>
        <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" id="st-done">—</div></div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="filterCards('ALL', this)">All</button>
        <button class="tab" onclick="filterCards('NEW', this)">New</button>
        <button class="tab" onclick="filterCards('ASSIGNED', this)">Accepted</button>
        <button class="tab" onclick="filterCards('OUT_FOR_DELIVERY', this)">In Transit</button>
        <button class="tab" onclick="filterCards('DELIVERED', this)">Delivered</button>
        <button class="tab" onclick="filterCards('FAILED', this)">Failed</button>
    </div>

    <div class="card-grid" id="cardGrid"></div>
</div>

<!-- Note Modal -->
<div class="overlay" id="noteModal">
    <div class="modal">
        <div class="modal-head">
            <span class="modal-title" id="noteTitle">Add Note</span>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <!-- Shown for reject -->
        <div class="field" id="modalRejectField">
            <label>Rejection Reason</label>
            <input id="noteInput" placeholder="Describe the reason…">
        </div>
        <!-- Shown for fail -->
        <div id="modalFailFields" style="display:none;">
            <div class="field" style="margin-bottom:.75rem;">
                <label>Failure Reason</label>
                <select id="failReasonCode" style="width:100%;padding:.65rem .9rem;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);background:var(--rose-50);outline:none;">
                    <option value="CUSTOMER_NOT_HOME">Customer not home</option>
                    <option value="WRONG_ADDRESS">Wrong address</option>
                    <option value="ACCESS_DENIED">Access denied</option>
                    <option value="DAMAGED">Package damaged</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
            <div class="field">
                <label>Additional Details (optional)</label>
                <input id="failDescription" placeholder="Any extra details…">
            </div>
        </div>
        <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1rem;">
            <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn-primary" id="noteConfirmBtn">Confirm</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const API     = 'http://localhost:8080';
    const token   = localStorage.getItem('vnd_token');
    const agentId = localStorage.getItem('vnd_agent_id');

    if (!token || !agentId) window.location.href = 'login.html';

    const authH = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };

    let allItems = [];
    let pendingAction = null;

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }

    async function apiFetch(path, method = 'GET', body = null) {
        const opts = { method, headers: authH };
        if (body) opts.body = JSON.stringify(body);
        const r = await fetch(API + path, opts);
        if (!r.ok) {
            let msg = 'Request failed';
            try { const j = await r.json(); msg = j.message || msg; } catch {}
            throw new Error(msg);
        }
        if (r.status === 204) return null;
        return r.json();
    }

    function toast(msg, type = '') {
        const el = document.getElementById('toast');
        el.textContent = msg; el.className = 'toast show ' + type;
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    async function load() {
        try {
            const assignments = await apiFetch(`/deliveryagent/assignments?agentId=${agentId}`);
            allItems = await Promise.all(assignments.map(async (a) => {
                try {
                    const delivery = await apiFetch(`/admin/deliveries/${a.deliveryId}`);
                    return { assignment: a, delivery };
                } catch {
                    return { assignment: a, delivery: null };
                }
            }));
            renderStats();
            renderCards(allItems);
        } catch (e) { toast('Failed to load deliveries', 'error'); }
    }

    function renderStats() {
        document.getElementById('st-total').textContent    = allItems.length;
        document.getElementById('st-assigned').textContent = allItems.filter(i => i.assignment.status === 'PENDING').length;
        document.getElementById('st-transit').textContent  = allItems.filter(i => i.delivery?.status === 'OUT_FOR_DELIVERY').length;
        document.getElementById('st-done').textContent     = allItems.filter(i => i.delivery?.status === 'DELIVERED').length;
    }

    function filterCards(key, btn) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        const filtered = key === 'ALL' ? allItems : allItems.filter(i => {
            if (key === 'NEW') return i.assignment.status === 'PENDING';
            return i.delivery?.status === key;
        });
        renderCards(filtered);
    }

    function renderCards(list) {
        const grid = document.getElementById('cardGrid');
        if (!list.length) {
            grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📭</div>No deliveries here</div>`;
            return;
        }
        grid.innerHTML = list.map(i => card(i)).join('');
    }

    const TRACK_STEPS = [
        { label: 'Order\nPlaced',     statuses: ['PENDING'] },
        { label: 'Agent\nAssigned',   statuses: ['ASSIGNED'] },
        { label: 'Out for\nDelivery', statuses: ['OUT_FOR_DELIVERY'] },
        { label: 'Delivered',         statuses: ['DELIVERED', 'FAILED'] },
    ];

    function card(item) {
        const { assignment, delivery } = item;

        if (!delivery) return `
        <div class="delivery-card">
          <div class="card-head">
            <div><div class="card-code">Assignment</div><div class="card-id">${assignment.id.substring(0,8)}…</div></div>
            <span class="badge badge-pending">Delivery unavailable</span>
          </div>
          <div class="card-actions">${agentActions(item)}</div>
        </div>`;

        const curIdx    = TRACK_STEPS.findIndex(s => s.statuses.includes(delivery.status));
        const trackHtml = `
      <div class="track-bar">
        ${TRACK_STEPS.map((s, i) => {
            const done = curIdx === -1 ? false : i < curIdx;
            const cur  = i === curIdx;
            const cls  = done ? 'done' : (cur ? 'cur' : '');
            const icon = done ? '✓' : (cur ? '●' : (i + 1));
            return `
            ${i > 0 ? `<div class="track-line ${done ? 'done' : ''}"></div>` : ''}
            <div class="track-step">
              <div class="track-dot ${cls}">${icon}</div>
              <div class="track-lbl ${cls}">${s.label.replace('\n','<br>')}</div>
            </div>`;
        }).join('')}
      </div>`;

        const note = delivery.notes ? `<div class="card-note">📝 ${delivery.notes}</div>` : '';

        return `
    <div class="delivery-card">
      <div class="card-head">
        <div>
          <div class="card-code">${delivery.trackingNumber}</div>
          <div class="card-id">Order #${delivery.orderId} · ${assignmentLabel(assignment.status)}</div>
        </div>
        ${deliveryBadge(delivery.status)}
      </div>
      ${trackHtml}
      <div class="card-row"><span class="card-icon">📍</span><span class="card-label">Address</span><span class="card-val">${delivery.deliveryAddress}</span></div>
      <div class="card-row"><span class="card-icon">#</span><span class="card-label">Tracking</span><span class="card-val">${delivery.trackingNumber}</span></div>
      ${note}
      <div class="card-actions">${agentActions(item)}</div>
    </div>`;
    }

    function agentActions(item) {
        const { assignment, delivery } = item;
        const btns = [];

        if (assignment.status === 'PENDING') {
            btns.push(`<button class="btn btn-success" onclick="acceptAssignment('${assignment.id}')">Accept</button>`);
            btns.push(`<button class="btn btn-danger"  onclick="openRejectModal('${assignment.id}')">Reject</button>`);
        }

        if (assignment.status === 'ACCEPTED' && delivery) {
            if (delivery.status === 'ASSIGNED')
                btns.push(`<button class="btn btn-rose" onclick="pickupDelivery('${delivery.id}')">Mark Picked Up</button>`);
            if (delivery.status === 'OUT_FOR_DELIVERY') {
                btns.push(`<button class="btn btn-success" onclick="deliverDelivery('${delivery.id}')">Mark Delivered</button>`);
                btns.push(`<button class="btn btn-danger"  onclick="openFailModal('${delivery.id}')">Mark Failed</button>`);
            }
            if (delivery.status === 'DELIVERED') {
                btns.push(`<button class="btn btn-outline" onclick="pickupReturn('${delivery.id}')">Pickup Return</button>`);
                btns.push(`<button class="btn btn-success" onclick="completeReturn('${delivery.id}')">Complete Return</button>`);
            }
        }

        return btns.join('');
    }

    // ── Assignment actions ────────────────────────────────────────────────────

    async function acceptAssignment(assignmentId) {
        try {
            await apiFetch(`/deliveryagent/assignments/${assignmentId}/accept?agentId=${agentId}`, 'POST');
            toast('Assignment accepted!', 'success');
            load();
        } catch (e) { toast('Failed to accept', 'error'); }
    }

    function openRejectModal(assignmentId) {
        pendingAction = { type: 'reject', id: assignmentId };
        document.getElementById('noteTitle').textContent          = 'Reject Delivery';
        document.getElementById('noteInput').value                = '';
        document.getElementById('modalRejectField').style.display = '';
        document.getElementById('modalFailFields').style.display  = 'none';
        document.getElementById('noteConfirmBtn').onclick         = confirmAction;
        document.getElementById('noteModal').classList.add('open');
    }

    // ── Delivery actions ──────────────────────────────────────────────────────

    async function pickupDelivery(deliveryId) {
        try {
            await apiFetch(`/deliveryagent/deliveries/${deliveryId}/pickup?agentId=${agentId}`, 'POST');
            toast('Marked as picked up!', 'success');
            load();
        } catch (e) { toast('Failed to update', 'error'); }
    }

    async function deliverDelivery(deliveryId) {
        try {
            await apiFetch(`/deliveryagent/deliveries/${deliveryId}/complete?agentId=${agentId}`, 'POST');
            toast('Marked as delivered!', 'success');
            load();
        } catch (e) { toast('Failed to update', 'error'); }
    }

    async function pickupReturn(deliveryId) {
        try {
            await apiFetch(`/deliveryagent/deliveries/${deliveryId}/pickup-return?agentId=${agentId}`, 'POST');
            toast('Return picked up!', 'success');
            load();
        } catch (e) { toast('Failed to update', 'error'); }
    }

    async function completeReturn(deliveryId) {
        try {
            await apiFetch(`/deliveryagent/deliveries/${deliveryId}/complete-return?agentId=${agentId}`, 'POST');
            toast('Return completed!', 'success');
            load();
        } catch (e) { toast('Failed to update', 'error'); }
    }

    function openFailModal(deliveryId) {
        pendingAction = { type: 'fail', id: deliveryId };
        document.getElementById('noteTitle').textContent          = 'Mark as Failed';
        document.getElementById('failReasonCode').selectedIndex   = 0;
        document.getElementById('failDescription').value          = '';
        document.getElementById('modalRejectField').style.display = 'none';
        document.getElementById('modalFailFields').style.display  = '';
        document.getElementById('noteConfirmBtn').onclick         = confirmAction;
        document.getElementById('noteModal').classList.add('open');
    }

    // ── Modal confirm ─────────────────────────────────────────────────────────

    async function confirmAction() {
        closeModal();
        try {
            if (pendingAction.type === 'reject') {
                const reason = document.getElementById('noteInput').value.trim();
                if (!reason) { toast('Please enter a reason', 'error'); return; }
                await apiFetch(`/deliveryagent/assignments/${pendingAction.id}/reject?agentId=${agentId}&reason=${encodeURIComponent(reason)}`, 'POST');
                toast('Assignment rejected', 'success');
            } else if (pendingAction.type === 'fail') {
                const reasonCode  = document.getElementById('failReasonCode').value;
                const description = document.getElementById('failDescription').value.trim() || null;
                await apiFetch(`/deliveryagent/deliveries/${pendingAction.id}/fail`, 'POST', {
                    loggedBy:  Number(agentId),
                    reasonCode,
                    description
                });
                toast('Delivery marked as failed', 'success');
            }
            load();
        } catch (e) { toast('Action failed', 'error'); }
    }

    function closeModal() { document.getElementById('noteModal').classList.remove('open'); }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function deliveryBadge(status) {
        const labels = {
            PENDING:          'Pending',
            ASSIGNED:         'Ready to Pickup',
            OUT_FOR_DELIVERY: 'Out for Delivery',
            DELIVERED:        'Delivered',
            FAILED:           'Failed',
            RETURNED:         'Returned'
        };
        return `<span class="badge badge-${status.toLowerCase()}">${labels[status] || status}</span>`;
    }

    function assignmentLabel(status) {
        return { PENDING: 'Awaiting response', ACCEPTED: 'Accepted', REJECTED: 'Rejected' }[status] || status;
    }

    load();
</script>
